# Outlaw Hardsuit
- type: entity
  parent: ClothingOuterHardsuitBaseNF
  id: ClothingOuterOutlawHardsuit
  name: outlaw hardsuit
  description: A rugged, lightly armored combat hardsuit used by Outlaws.
  components:
  - type: Sprite
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/ussp_combat_light.rsi
  - type: Clothing
    sprite: _Mono/Clothing/OuterClothing/Hardsuits/ussp_combat_light.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.5
    lowPressureMultiplier: 1000
  - type: ExplosionResistance
    damageCoefficient: 0.60
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.70
        Slash: 0.70
        Piercing: 0.70
        Heat: 0.75
        Radiation: 0.75
        Caustic: 0.8
  - type: ClothingSpeedModifier
    walkModifier: 0.9
    sprintModifier: 0.9
  - type: HeldSpeedModifier
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadOutlawHardsuit

# Outlaw Tactical Hardsuit
- type: entity
