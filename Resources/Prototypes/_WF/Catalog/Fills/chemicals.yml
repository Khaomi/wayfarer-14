# Moonshine
- type: entity
  parent: CustomDrinkJug
  id: CustomDrinkJugMoonshine
  components:
  - type: Label
    currentLabel: reagent-name-moonshine
  - type: SolutionContainerManager
    solutions:
      injector:
        maxVol: 15
        reagents:
        - ReagentId: Moonshine
          Quantity: 150

